name: Backend CI and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      rollback_image:
        description: "Optional full image reference to deploy, e.g. ghcr.io/org/kingshot-hive:sha"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Copy frontend for embed
        run: |
          mkdir -p backend/cmd/server/frontend/assets
          cp index.html backend/cmd/server/frontend/
          cp -r assets/* backend/cmd/server/frontend/assets/
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: backend
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Copy frontend for embed
        run: |
          mkdir -p backend/cmd/server/frontend/assets
          cp index.html backend/cmd/server/frontend/
          cp -r assets/* backend/cmd/server/frontend/assets/
      - name: Run tests
        working-directory: backend
        run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Copy frontend for embed
        run: |
          mkdir -p backend/cmd/server/frontend/assets
          cp index.html backend/cmd/server/frontend/
          cp -r assets/* backend/cmd/server/frontend/assets/
      - name: Build binary
        working-directory: backend
        run: CGO_ENABLED=0 go build -o kingshot-server ./cmd/server

  docker:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name != 'pull_request'
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build_push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64,linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/kingshot-hive:latest
            ghcr.io/${{ github.repository_owner }}/kingshot-hive:${{ github.sha }}

      - name: Export image ref
        id: meta
        run: echo "image_ref=ghcr.io/${{ github.repository_owner }}/kingshot-hive:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            export DB_DIR="${{ secrets.DEPLOY_PATH }}/data"
            export APP_IMAGE="${{ github.event.inputs.rollback_image != '' && github.event.inputs.rollback_image || needs.docker.outputs.image_ref }}"
            docker compose -f deploy/compose.prod.yml pull
            docker compose -f deploy/compose.prod.yml up -d
            docker image prune -f
