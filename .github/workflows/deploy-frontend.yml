name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static bundle
        env:
          PROD_API_BASE: ${{ vars.PROD_API_BASE }}
        run: |
          set -e
          mkdir -p dist/assets/css dist/assets/js
          cp index.html dist/index.html
          cp assets/css/style.css dist/assets/css/style.css
          cp assets/js/planner.js dist/assets/js/planner.js
          API_BASE="${PROD_API_BASE}"
          echo "DEBUG: API_BASE='${API_BASE}'"
          sed -i "s|__API_BASE__|${API_BASE}|g" dist/index.html
          echo "DEBUG: result:"
          grep -n "API_BASE" dist/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
