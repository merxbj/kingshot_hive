<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Kingshot Planner</title>

    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<dialog id="castleDialog">

    <form method="dialog" id="castleForm">

        <h3 id="castleDialogTitle">New castle</h3>

        <label>
            Player name
            <input type="text" id="castleName" required>
        </label>

        <label>
            Power
            <input type="text" id="castlePower" placeholder="10M">
        </label>

        <label>Trap</label>

        <div class="trap-select">
            <button type="button" onclick="setTrap('M', this)">M</button>
            <button type="button" onclick="setTrap('E', this)">E</button>
            <button type="button" onclick="setTrap('F', this)" class="active">F</button>
        </div>

        <input type="hidden" id="castleTrap" value="F">

        <div class="dialog-buttons">
            <button id="castleAddBtn" value="ok">Add</button>
            <button type="button" id="castleCancelBtn">Cancel</button>
        </div>

    </form>

</dialog>

<dialog id="deleteDialog">

    <p id="deleteText">Delete object?</p>

    <div class="dialog-buttons">
        <button id="deleteConfirm">Delete</button>
        <button id="deleteCancel">Cancel</button>
    </div>

</dialog>

<h2>Kingshot Bear Trap Layout</h2>

<div class="layout">

    <div class="player-panel">

        <div class="player-header">
            <button onclick="exportPlayerList()">Export player list</button>
        </div>

        <div id="playerList"></div>

    </div>

    <div class="map-area">

        <div class="toolbar-container">

            <div class="toolbar-group">
                <button onclick="addCastle()">Add castle</button>
                <button onclick="addBanner()">Add banner</button>
                <button onclick="addPlainsHQ()">Add Plains HQ</button>
            </div>

            <div class="toolbar-group">
                <button onclick="saveLayout()">Save layout</button>
                <button onclick="loadLayout()">Load layout</button>
                <button onclick="exportLayout()">Export layout</button>
                <input type="file" id="importFile">
                <button onclick="importLayout(document.getElementById('importFile').files[0])">
                    Import layout
                </button>
                <button onclick="exportScreenshot()">Export image</button>
            </div>

            <div class="toolbar-group">
                <button class="zoom-btn" onclick="setZoom(0.75,this)">75%</button>
                <button class="zoom-btn active" onclick="setZoom(1,this)">100%</button>
                <button class="zoom-btn" onclick="setZoom(1.5,this)">150%</button>
                <button class="zoom-btn" onclick="setZoom(2,this)">200%</button>
            </div>

        </div>

        <div id="map">
            <div id="trap1" class="trap">Trap 1</div>
            <div id="trap2" class="trap">Trap 2</div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="assets/js/planner.js"></script>

</body>
</html>
